services:
  # Test DB for grc-stamp integration tests. MariaDB 11.4 LTS, wire-
  # compatible with mysql2 and accepts MYSQL_* env vars unchanged.
  test_grc_mysql:
    image: mariadb:11.4
    container_name: test_grc_mysql
    command: --character-set-server=utf8mb4
    ports:
      - 3306:3306
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=true
      - MYSQL_USER=test
      - MYSQL_PASSWORD=test
      - MYSQL_DATABASE=test