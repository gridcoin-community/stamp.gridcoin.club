version: 2.1

defaults: &defaults
  working_directory: ~/app
  docker:
    - image: cimg/node:22.16

jobs:
  install-and-detect:
    <<: *defaults
    environment:
      PIPELINE_BASE_REVISION: << pipeline.git.base_revision >>
    steps:
      - checkout
      - run:
          name: Fetch full history and tags for Nx affected comparison
          command: |
            # Unshallow so `git describe` can walk back to release tags.
            # Falls back to a plain fetch if the clone is already complete.
            git fetch --tags --unshallow origin master:refs/remotes/origin/master 2>/dev/null || \
              git fetch --tags origin master:refs/remotes/origin/master
      - restore_cache:
          keys:
            - v2-root-deps-{{ checksum "package-lock.json" }}
      - restore_cache:
          keys:
            - v2-stamp-deps-{{ checksum "packages/grc-stamp/package-lock.json" }}
      - restore_cache:
          keys:
            - v2-frontend-deps-{{ checksum "packages/grc-stamp-frontend/package-lock.json" }}
      - run:
          name: Install root dependencies
          command: |
            HASH=$(sha256sum package-lock.json | awk '{print $1}')
            if [ -f node_modules/.lockfile-hash ] && [ "$(cat node_modules/.lockfile-hash)" = "$HASH" ]; then
              echo "Root deps cache hit — skipping install"
            else
              npm ci
              echo "$HASH" > node_modules/.lockfile-hash
            fi
      - run:
          name: Install grc-stamp dependencies
          command: |
            cd ~/app/packages/grc-stamp
            HASH=$(sha256sum package-lock.json | awk '{print $1}')
            if [ -f node_modules/.lockfile-hash ] && [ "$(cat node_modules/.lockfile-hash)" = "$HASH" ]; then
              echo "grc-stamp deps cache hit — skipping install"
            else
              npm ci
              echo "$HASH" > node_modules/.lockfile-hash
            fi
      - run:
          name: Install grc-stamp-frontend dependencies
          command: |
            cd ~/app/packages/grc-stamp-frontend
            HASH=$(sha256sum package-lock.json | awk '{print $1}')
            if [ -f node_modules/.lockfile-hash ] && [ "$(cat node_modules/.lockfile-hash)" = "$HASH" ]; then
              echo "grc-stamp-frontend deps cache hit — skipping install"
            else
              npm ci
              echo "$HASH" > node_modules/.lockfile-hash
            fi
      - save_cache:
          key: v2-root-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/app/node_modules
      - save_cache:
          key: v2-stamp-deps-{{ checksum "packages/grc-stamp/package-lock.json" }}
          paths:
            - ~/app/packages/grc-stamp/node_modules
      - save_cache:
          key: v2-frontend-deps-{{ checksum "packages/grc-stamp-frontend/package-lock.json" }}
          paths:
            - ~/app/packages/grc-stamp-frontend/node_modules
      - run:
          name: Detect affected projects
          command: |
            mkdir -p ~/app/.affected

            # Compare against the previous CI run on this branch.
            # Release jobs on master always run (semantic-release decides
            # whether to publish), so this only gates check/test jobs.
            check_affected() {
              local project="$1"
              local base

              if [ -n "$PIPELINE_BASE_REVISION" ]; then
                base="$PIPELINE_BASE_REVISION"
              else
                base="origin/master"
              fi

              echo "Checking $project against base: $base"
              local affected
              affected=$(npx nx show projects --affected --base="$base" --head=HEAD 2>/dev/null) || {
                echo "  WARNING: affected detection failed (base=$base), marking $project as affected"
                echo "true" > ~/app/.affected/"$project"
                return
              }
              echo "  affected projects in range: $affected"
              if echo "$affected" | grep -qw "$project"; then
                echo "true" > ~/app/.affected/"$project"
              else
                echo "false" > ~/app/.affected/"$project"
              fi
              echo "  $project affected: $(cat ~/app/.affected/"$project")"
            }

            check_affected grc-stamp
            check_affected grc-stamp-frontend
      - persist_to_workspace:
          root: ~/app
          paths: .

  grc-stamp-checks:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/app
      - run:
          name: Check if grc-stamp is affected
          command: |
            FLAG=$(cat ~/app/.affected/grc-stamp 2>/dev/null || echo "false")
            if [ "$FLAG" != "true" ]; then
              echo "grc-stamp not affected, skipping"
              circleci-agent step halt
            fi
      - run:
          name: Run lint
          command: cd ~/app/packages/grc-stamp && npm run test:lint
      - run:
          name: Run typecheck
          command: cd ~/app/packages/grc-stamp && npm run typecheck
      - run:
          name: Run unit tests
          command: cd ~/app/packages/grc-stamp && npm run test:unit

  grc-stamp-integration:
    <<: *defaults
    docker:
      - image: cimg/node:22.16
      - image: cimg/mysql:5.7
        environment:
          MYSQL_RANDOM_ROOT_PASSWORD: true
          MYSQL_USER: test
          MYSQL_PASSWORD: test
          MYSQL_DATABASE: test
    steps:
      - attach_workspace:
          at: ~/app
      - run:
          name: Check if grc-stamp is affected
          command: |
            FLAG=$(cat ~/app/.affected/grc-stamp 2>/dev/null || echo "false")
            if [ "$FLAG" != "true" ]; then
              echo "grc-stamp not affected, skipping"
              circleci-agent step halt
            fi
      - run:
          name: Wait for MySQL
          command: sleep 7
      - run:
          name: Run integration tests
          command: cd ~/app/packages/grc-stamp && npm run test:integration

  grc-stamp-frontend-checks:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/app
      - run:
          name: Check if grc-stamp-frontend is affected
          command: |
            FLAG=$(cat ~/app/.affected/grc-stamp-frontend 2>/dev/null || echo "false")
            if [ "$FLAG" != "true" ]; then
              echo "grc-stamp-frontend not affected, skipping"
              circleci-agent step halt
            fi
      - run:
          name: Run lint
          command: cd ~/app/packages/grc-stamp-frontend && npm run test:lint
      - run:
          name: Run typecheck
          command: cd ~/app/packages/grc-stamp-frontend && npm run typecheck
      - run:
          name: Run unit tests
          command: cd ~/app/packages/grc-stamp-frontend && npm run test:unit

  grc-stamp-release:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/app
      - run:
          name: Trust SSH key
          command: mkdir -p ~/.ssh/ && touch ~/.ssh/known_hosts && ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run:
          name: Semantic release
          command: cd ~/app/packages/grc-stamp && npm run semantic-release

  grc-stamp-frontend-release:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/app
      - run:
          name: Trust SSH key
          command: mkdir -p ~/.ssh/ && touch ~/.ssh/known_hosts && ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run:
          name: Semantic release
          command: cd ~/app/packages/grc-stamp-frontend && npm run semantic-release

  grc-stamp_build_image:
    <<: *defaults
    docker:
      - image: docker:git
    steps:
      - checkout
      - run:
          name: Get the recent changes
          command: git pull origin master
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Install dependencies
          command: apk add --no-cache jq
      - restore_cache:
          keys:
            - v1-{{ .Branch }}
          paths:
            - /caches/grc-stamp.tar
      - run:
          name: Load Docker image layer cache
          command: |
            set +o pipefail
            docker load -i /caches/grc-stamp.tar | true
      - run:
          name: Build application Docker image
          command: |
            cd ~/app/packages/grc-stamp && docker build --cache-from=app -t app -f Dockerfile.prod .
      - run:
          name: Save Docker image layer cache
          command: |
            mkdir -p /caches
            cd ~/app/packages/grc-stamp && docker save -o /caches/grc-stamp.tar app
      - deploy:
          name: Push application Docker image
          command: |
            cd ~/app/packages/grc-stamp
            docker login ghcr.io -u gridcat -p${CR_PAT}
            docker tag app "ghcr.io/gridcat/$(jq -r '.name' package.json):$(jq -r '.version' package.json)"
            docker push "ghcr.io/gridcat/$(jq -r '.name' package.json):$(jq -r '.version' package.json)"
            docker tag app "ghcr.io/gridcat/$(jq -r '.name' package.json):latest"
            docker push "ghcr.io/gridcat/$(jq -r '.name' package.json):latest"

  grc-stamp-frontend_build_image:
    <<: *defaults
    docker:
      - image: docker:git
    steps:
      - checkout
      - run:
          name: Get the recent changes
          command: git pull origin master
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Install dependencies
          command: apk add --no-cache jq
      - restore_cache:
          keys:
            - v1-{{ .Branch }}
          paths:
            - /caches/grc-stamp-frontend.tar
      - run:
          name: Load Docker image layer cache
          command: |
            set +o pipefail
            docker load -i /caches/grc-stamp-frontend.tar | true
      - run:
          name: Build application Docker image
          command: |
            cd ~/app/packages/grc-stamp-frontend && docker build --cache-from=app -t app .
      - run:
          name: Save Docker image layer cache
          command: |
            mkdir -p /caches
            cd ~/app/packages/grc-stamp-frontend && docker save -o /caches/grc-stamp-frontend.tar app
      - deploy:
          name: Push application Docker image
          command: |
            cd ~/app/packages/grc-stamp-frontend
            docker login ghcr.io -u gridcat -p${CR_PAT}
            docker tag app "ghcr.io/gridcat/$(jq -r '.name' package.json):$(jq -r '.version' package.json)"
            docker push "ghcr.io/gridcat/$(jq -r '.name' package.json):$(jq -r '.version' package.json)"
            docker tag app "ghcr.io/gridcat/$(jq -r '.name' package.json):latest"
            docker push "ghcr.io/gridcat/$(jq -r '.name' package.json):latest"

workflows:
  ci:
    jobs:
      - install-and-detect:
          filters:
            tags:
              ignore: /.*/

      - grc-stamp-checks:
          requires:
            - install-and-detect

      - grc-stamp-integration:
          requires:
            - install-and-detect

      - grc-stamp-frontend-checks:
          requires:
            - install-and-detect

      - grc-stamp-release:
          requires:
            - grc-stamp-checks
            - grc-stamp-integration
          filters:
            branches:
              only: master

      - grc-stamp-frontend-release:
          requires:
            - grc-stamp-frontend-checks
          filters:
            branches:
              only: master

  grc-stamp_deploy-tag:
    jobs:
      - grc-stamp_build_image:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^grc-stamp-v.*/

  grc-stamp-frontend_deploy-tag:
    jobs:
      - grc-stamp-frontend_build_image:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^grc-stamp-frontend-v.*/
